name: sganpos_flutter
description: SGANPOS Mobile Waiter App - Built with Flutter for iOS and Android
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking & HTTP
  http: ^1.1.0
  socket_io_client: ^2.0.1

  # State Management
  provider: ^6.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # JWT Decoding
  jwt_decoder: ^2.0.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Date & Time
  intl: ^0.19.0

  # UI
  cupertino_icons: ^1.0.2
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_linter:
    path: ./linter

flutter:
  uses-material-design: true

  # Assets (images, icons, etc.)
  assets:
    - assets/images/
    - assets/icons/

  # Custom Fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
